<svg width="450" height="812" viewBox="0 0 450 812" xmlns="http://www.w3.org/2000/svg">
  <!-- 手机背景 - 白色 -->
  <rect width="450" height="812" fill="#ffffff" rx="40"/>
  
  <!-- 边框 -->
  <rect width="450" height="812" fill="none" stroke="#e0e0e0" stroke-width="2" rx="40"/>
  
  <!-- 顶部状态栏 -->
  <rect width="450" height="44" fill="#f5f5f5"/>
  <text x="20" y="30" font-size="14" fill="#333">18:17</text>
  
  <!-- 标题 -->
  <text x="225" y="90" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Editor</text>
  
  <!-- 内容区域 -->
  <rect x="12" y="120" width="426" height="500" rx="15" fill="#fafafa"/>
  
  <!-- 弹窗 -->
  <rect x="40" y="200" width="370" height="450" rx="20" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="225" y="240" font-size="20" font-weight="bold" fill="#000" text-anchor="middle">Select Platform</text>
  
  <!-- 平台列表 -->
  <g transform="translate(60, 270)">
    <!-- 小红书 -->
    <circle cx="20" cy="20" r="18" fill="#E91E63"/>
    <text x="50" y="25" font-size="16" font-weight="bold" fill="#000">Xiaohongshu</text>
    <text x="50" y="42" font-size="12" fill="#999">Post to Xiaohongshu</text>
  </g>
  
  <g transform="translate(60, 350)">
    <!-- 抖音 -->
    <circle cx="20" cy="20" r="18" fill="#000"/>
    <text x="50" y="25" font-size="16" font-weight="bold" fill="#000">Douyin</text>
    <text x="50" y="42" font-size="12" fill="#999">Post to Douyin</text>
  </g>
  
  <g transform="translate(60, 430)">
    <!-- Facebook -->
    <circle cx="20" cy="20" r="18" fill="#1877F2"/>
    <text x="50" y="25" font-size="16" font-weight="bold" fill="#000">Facebook</text>
    <text x="50" y="42" font-size="12" fill="#999">Share to Facebook</text>
  </g>
  
  <g transform="translate(60, 510)">
    <!-- Instagram -->
    <circle cx="20" cy="20" r="18" fill="#E4405F"/>
    <text x="50" y="25" font-size="16" font-weight="bold" fill="#000">Instagram</text>
    <text x="50" y="42" font-size="12" fill="#999">Share to Instagram</text>
  </g>
  
  <g transform="translate(60, 590)">
    <!-- X (Twitter) -->
    <circle cx="20" cy="20" r="18" fill="#000"/>
    <text x="50" y="25" font-size="16" font-weight="bold" fill="#000">X</text>
    <text x="50" y="42" font-size="12" fill="#999">Share to X (Twitter)</text>
  </g>
  
  <!-- 底部按钮 -->
  <rect x="40" y="720" width="370" height="50" rx="25" fill="#E91E63"/>
  <text x="225" y="750" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">Publish Now</text>
</svg>
