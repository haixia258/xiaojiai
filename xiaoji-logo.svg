<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 300" width="1100" height="300">
  <defs>
    <style>
      .key-pink { fill: #E91E63; }
      .text-gray { fill: #555555; }
      .text-white { fill: #FFFFFF; }
      .bg-dark { fill: #333333; }
    </style>
  </defs>
  
  <!-- 左侧钥匙图标 -->
  <g transform="translate(150, 150)">
    <!-- 外圆环 -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#E91E63" stroke-width="20"/>
    
    <!-- 内部填充圆 -->
    <circle cx="0" cy="0" r="110" class="key-pink"/>
    
    <!-- 钥匙头部 - 白色圆形 -->
    <circle cx="0" cy="-30" r="32" class="text-white"/>
    
    <!-- 钥匙柄 -->
    <rect x="-16" y="28" width="32" height="95" class="text-white" rx="3"/>
    
    <!-- 钥匙柄上的孔1 -->
    <circle cx="0" cy="55" r="9" class="key-pink"/>
    
    <!-- 钥匙柄上的孔2 -->
    <circle cx="0" cy="80" r="9" class="key-pink"/>
    
    <!-- 钥匙柄上的孔3 -->
    <circle cx="0" cy="105" r="9" class="key-pink"/>
  </g>
  
  <!-- 主文字：小鸡说AI - 灰色斜体科技风 -->
  <g transform="translate(350, 150)">
    <g transform="skewX(-10)">
      <!-- 小 字 -->
      <path d="M 0,-55 L 10,-55 L 10,25 L 0,25 Z M -6,-28 L 16,-28 L 16,-20 L -6,-20 Z M 0,-70 L 10,-70 L 10,-55 L 0,-55 Z M -4,-73 L 14,-73 L 14,-67 L -4,-67 Z" class="text-gray"/>
      <rect x="11" y="-57" width="3" height="3" class="text-gray"/>
      
      <!-- 鸡 字 -->
      <path d="M 45,-55 L 55,-55 L 55,25 L 45,25 Z M 37,-32 L 63,-32 L 63,-24 L 37,-24 Z M 37,-8 L 63,-8 L 63,0 L 37,0 Z M 70,-48 L 90,-48 L 90,-40 L 70,-40 Z M 70,-22 L 90,-22 L 90,-14 L 70,-14 Z" class="text-gray"/>
      <rect x="91" y="-50" width="3" height="3" class="text-gray"/>
      <rect x="91" y="-24" width="3" height="3" class="text-gray"/>
      
      <!-- 说 字 -->
      <path d="M 115,-55 L 125,-55 L 125,25 L 115,25 Z M 107,-32 L 133,-32 L 133,-24 L 107,-24 Z M 107,-8 L 133,-8 L 133,0 L 107,0 Z" class="text-gray"/>
      <!-- 口字旁上 -->
      <path d="M 145,-60 L 185,-60 L 185,-52 L 145,-52 Z M 145,-60 L 153,-60 L 153,-28 L 145,-28 Z M 177,-60 L 185,-60 L 185,-28 L 177,-28 Z M 145,-36 L 185,-36 L 185,-28 L 145,-28 Z" class="text-gray"/>
      <!-- 口字旁下 -->
      <path d="M 145,-5 L 185,-5 L 185,3 L 145,3 Z M 145,-5 L 153,-5 L 153,27 L 145,27 Z M 177,-5 L 185,-5 L 185,27 L 177,27 Z M 145,19 L 185,19 L 185,27 L 145,27 Z" class="text-gray"/>
      <rect x="186" y="-62" width="3" height="3" class="text-gray"/>
      <rect x="186" y="-7" width="3" height="3" class="text-gray"/>
      <rect x="186" y="28" width="3" height="3" class="text-gray"/>
      
      <!-- AI 文字 - 灰色粗体 -->
      <text x="215" y="20" font-family="'Arial Black', sans-serif" font-size="110" font-weight="900" class="text-gray" letter-spacing="8">AI</text>
    </g>
  </g>
  
  <!-- 底部拼音框 XIAOJAI -->
  <g transform="translate(350, 230)">
    <!-- 背景框 -->
    <rect x="0" y="0" width="650" height="55" class="bg-dark" rx="5"/>
    
    <!-- 拼音字母 -->
    <text x="325" y="38" font-family="Arial, sans-serif" font-size="32" font-weight="400" class="text-white" text-anchor="middle" letter-spacing="38">X I A O J I A I</text>
  </g>
</svg>