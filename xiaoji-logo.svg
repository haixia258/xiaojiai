<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <style>
      .key-pink { fill: #E91E63; }
      .text-gray { fill: #666666; }
      .text-white { fill: #FFFFFF; }
      .bg-dark { fill: #2a2a2a; }
    </style>
  </defs>
  
  <!-- 左侧钥匙图标 -->
  <g transform="translate(180, 250)">
    <!-- 外圆环 -->
    <circle cx="0" cy="0" r="150" fill="none" stroke="#E91E63" stroke-width="25"/>
    
    <!-- 内部填充圆 -->
    <circle cx="0" cy="0" r="125" class="key-pink"/>
    
    <!-- 钥匙头部 - 白色圆形 -->
    <circle cx="0" cy="-40" r="35" class="text-white"/>
    
    <!-- 钥匙柄 -->
    <rect x="-18" y="30" width="36" height="110" class="text-white" rx="3"/>
    
    <!-- 钥匙柄上的孔1 -->
    <circle cx="0" cy="60" r="10" fill="#E91E63"/>
    
    <!-- 钥匙柄上的孔2 -->
    <circle cx="0" cy="90" r="10" fill="#E91E63"/>
    
    <!-- 钥匙柄上的孔3 -->
    <circle cx="0" cy="120" r="10" fill="#E91E63"/>
  </g>
  
  <!-- 主文字区域 - 小鸡说AI -->
  <g transform="translate(420, 250)">
    <!-- 使用倾斜变换模拟斜体效果 -->
    <g transform="skewX(-12)">
      <!-- 小 -->
      <path d="M 0,-60 L 35,-60 L 40,-20 L 5,-20 Z M 15,-80 L 25,-80 L 30,-60 L 20,-60 Z M 10,-100 L 30,-100 L 35,-80 L 15,-80 Z M 15,0 L 25,0 L 30,40 L 20,40 Z" class="text-gray"/>
      
      <!-- 鸡 -->
      <path d="M 70,-60 L 105,-60 L 110,-20 L 75,-20 Z M 60,-40 L 120,-40 L 125,-20 L 65,-20 Z M 60,0 L 120,0 L 125,20 L 65,20 Z M 130,-70 L 170,-70 L 175,-50 L 135,-50 Z M 130,-30 L 170,-30 L 175,-10 L 135,-10 Z" class="text-gray"/>
      
      <!-- 说 -->
      <path d="M 200,-60 L 235,-60 L 240,-20 L 205,-20 Z M 190,-40 L 250,-40 L 255,-20 L 195,-20 Z M 190,0 L 250,0 L 255,20 L 195,20 Z M 270,-80 L 350,-80 L 355,-60 L 275,-60 Z M 270,-80 L 285,-60 L 290,-20 L 275,0 Z M 340,-80 L 355,-60 L 360,-20 L 345,0 Z M 270,-40 L 350,-40 L 355,-20 L 275,-20 Z M 270,0 L 350,0 L 355,20 L 275,20 Z M 270,0 L 285,20 L 290,40 L 275,60 Z M 340,0 L 355,20 L 360,40 L 345,60 Z M 270,40 L 350,40 L 355,60 L 275,60 Z" class="text-gray"/>
      
      <!-- AI -->
      <text x="380" y="20" font-family="'Arial Black', sans-serif" font-size="140" font-weight="900" class="text-gray" letter-spacing="5">AI</text>
    </g>
  </g>
  
  <!-- 底部拼音 XIAOJAI -->
  <g transform="translate(420, 400)">
    <!-- 背景框 -->
    <rect x="0" y="0" width="700" height="70" class="bg-dark" rx="8"/>
    
    <!-- 拼音字母 -->
    <text x="350" y="50" font-family="Arial, sans-serif" font-size="42" font-weight="400" class="text-white" text-anchor="middle" letter-spacing="42">XIAOJAI</text>
  </g>
</svg>