<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 280" width="1024" height="280">
  <defs>
    <style>
      .logo-pink { fill: #E91E63; }
      .logo-text { fill: #E91E63; font-family: 'Arial Black', 'Microsoft YaHei', sans-serif; font-weight: 900; }
      .logo-subtitle { fill: #E91E63; font-family: Arial, sans-serif; font-size: 18px; letter-spacing: 12px; font-weight: 300; }
    </style>
  </defs>
  
  <!-- 左侧钥匙图标 -->
  <g transform="translate(140, 140)">
    <!-- 外圆环 -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#E91E63" stroke-width="18"/>
    
    <!-- 内部填充圆 -->
    <circle cx="0" cy="0" r="102" class="logo-pink"/>
    
    <!-- 钥匙头部 - 白色圆形 -->
    <circle cx="0" cy="-25" r="28" fill="#FFFFFF"/>
    
    <!-- 钥匙柄 -->
    <rect x="-14" y="25" width="28" height="85" fill="#FFFFFF" rx="2"/>
    
    <!-- 钥匙柄上的孔1 -->
    <circle cx="0" cy="50" r="8" fill="#E91E63"/>
    
    <!-- 钥匙柄上的孔2 -->
    <circle cx="0" cy="75" r="8" fill="#E91E63"/>
    
    <!-- 钥匙柄上的孔3 -->
    <circle cx="0" cy="95" r="8" fill="#E91E63"/>
  </g>
  
  <!-- 主文字：小鸡说AI - 科技风格带切角 -->
  <g transform="translate(320, 140)">
    <!-- 小 字 - 带切角 -->
    <g transform="skewX(-8)">
      <path d="M 0,-50 L 8,-50 L 8,30 L 0,30 Z M -5,-25 L 13,-25 L 13,-17 L -5,-17 Z M 0,-65 L 8,-65 L 8,-50 L 0,-50 Z M -3,-68 L 11,-68 L 11,-62 L -3,-62 Z" class="logo-pink"/>
      <!-- 切角装饰 -->
      <rect x="9" y="-52" width="3" height="3" class="logo-pink"/>
      <line x1="10" y1="-55" x2="10" y2="-52" stroke="#E91E63" stroke-width="2"/>
    </g>
    
    <!-- 鸡 字 - 带切角 -->
    <g transform="translate(40, 0) skewX(-8)">
      <path d="M 0,-50 L 8,-50 L 8,30 L 0,30 Z M -8,-30 L 16,-30 L 16,-22 L -8,-22 Z M -8,-5 L 16,-5 L 16,3 L -8,3 Z M 22,-45 L 38,-45 L 38,-37 L 22,-37 Z M 22,-20 L 38,-20 L 38,-12 L 22,-12 Z" class="logo-pink"/>
      <rect x="39" y="-47" width="3" height="3" class="logo-pink"/>
      <rect x="39" y="-22" width="3" height="3" class="logo-pink"/>
    </g>
    
    <!-- 说 字 - 带切角 -->
    <g transform="translate(100, 0) skewX(-8)">
      <path d="M 0,-50 L 8,-50 L 8,30 L 0,30 Z M -8,-30 L 16,-30 L 16,-22 L -8,-22 Z M -8,-5 L 16,-5 L 16,3 L -8,3 Z" class="logo-pink"/>
      <!-- 口字旁 -->
      <path d="M 25,-55 L 55,-55 L 55,-47 L 25,-47 Z M 25,-55 L 33,-55 L 33,-25 L 25,-25 Z M 47,-55 L 55,-55 L 55,-25 L 47,-25 Z M 25,-33 L 55,-33 L 55,-25 L 25,-25 Z" class="logo-pink"/>
      <path d="M 25,0 L 55,0 L 55,8 L 25,8 Z M 25,0 L 33,0 L 33,30 L 25,30 Z M 47,0 L 55,0 L 55,30 L 47,30 Z M 25,22 L 55,22 L 55,30 L 25,30 Z" class="logo-pink"/>
      <!-- 切角 -->
      <rect x="56" y="-57" width="3" height="3" class="logo-pink"/>
      <rect x="56" y="-2" width="3" height="3" class="logo-pink"/>
      <rect x="56" y="31" width="3" height="3" class="logo-pink"/>
      <line x1="57" y1="-60" x2="57" y2="-57" stroke="#E91E63" stroke-width="2"/>
    </g>
    
    <!-- AI 文字 - 粗体 -->
    <text x="200" y="20" class="logo-text" font-size="100" letter-spacing="8" transform="skewX(-8)">AI</text>
    
    <!-- 顶部电路线装饰 -->
    <line x1="-20" y1="-70" x2="380" y2="-70" stroke="#E91E63" stroke-width="2"/>
    <rect x="50" y="-73" width="4" height="4" class="logo-pink"/>
    <rect x="150" y="-73" width="4" height="4" class="logo-pink"/>
    <rect x="250" y="-73" width="4" height="4" class="logo-pink"/>
    
    <!-- 底部电路线装饰 -->
    <line x1="-20" y1="45" x2="380" y2="45" stroke="#E91E63" stroke-width="2"/>
    <rect x="80" y="43" width="4" height="4" class="logo-pink"/>
    <rect x="180" y="43" width="4" height="4" class="logo-pink"/>
    <rect x="280" y="43" width="4" height="4" class="logo-pink"/>
  </g>
  
  <!-- 底部拼音 XIAO JI AI -->
  <text x="320" y="220" class="logo-subtitle">X I A O J I A I</text>
  
  <!-- 右侧电路装饰 -->
  <g transform="translate(900, 140)">
    <line x1="0" y1="-30" x2="30" y2="-30" stroke="#E91E63" stroke-width="2"/>
    <line x1="30" y1="-30" x2="30" y2="10" stroke="#E91E63" stroke-width="2"/>
    <line x1="30" y1="10" x2="50" y2="10" stroke="#E91E63" stroke-width="2"/>
    <rect x="48" y="8" width="4" height="4" class="logo-pink"/>
    <rect x="28" y="-32" width="4" height="4" class="logo-pink"/>
    <line x1="30" y1="-10" x2="45" y2="-10" stroke="#E91E63" stroke-width="2"/>
    <rect x="43" y="-12" width="4" height="4" class="logo-pink"/>
  </g>
</svg>