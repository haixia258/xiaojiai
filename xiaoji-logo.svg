<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" width="1100" height="450">
  <defs>
    <style>
      .logo-pink { fill: #E91E63; }
      .logo-gray { fill: #555555; }
      .logo-white { fill: #FFFFFF; }
      .logo-stroke-pink { stroke: #E91E63; stroke-width: 12; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  
  <!-- 左侧钥匙图标 -->
  <g transform="translate(170, 225)">
    <!-- 外圆环 -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#E91E63" stroke-width="20"/>
    
    <!-- 内圆环 -->
    <circle cx="0" cy="0" r="100" class="logo-pink"/>
    
    <!-- 钥匙头部白色圆点 -->
    <circle cx="0" cy="-30" r="25" class="logo-white"/>
    
    <!-- 钥匙柄主体 -->
    <rect x="-15" y="40" width="30" height="90" class="logo-pink" rx="5"/>
    
    <!-- 钥匙齿孔1 -->
    <circle cx="0" cy="70" r="8" fill="#000000"/>
    
    <!-- 钥匙齿孔2 -->
    <circle cx="0" cy="95" r="8" fill="#000000"/>
    
    <!-- 钥匙齿孔3 -->
    <circle cx="0" cy="120" r="8" fill="#000000"/>
  </g>
  
  <!-- 主文字：小鸡说AI - 灰色斜体科技风 -->
  <g transform="translate(400, 280)">
    <!-- 小 字 -->
    <path d="M 0,-80 L 30,-50 L 30,20 L 0,-10 Z M 10,-60 L 50,-60 L 50,-40 L 10,-20 Z M 15,-100 L 25,-100 L 25,-80 L 15,-70 Z" class="logo-gray" transform="skewX(-10)"/>
    
    <!-- 鸡 字 -->
    <path d="M 80,-80 L 110,-50 L 110,20 L 80,-10 Z M 70,-50 L 120,-50 L 120,-30 L 70,-10 Z M 70,-10 L 120,-10 L 120,10 L 70,30 Z M 130,-70 L 160,-70 L 160,-50 L 130,-30 Z M 130,-30 L 160,-30 L 160,-10 L 130,10 Z" class="logo-gray" transform="skewX(-10)"/>
    
    <!-- 说 字 -->
    <path d="M 190,-80 L 220,-50 L 220,20 L 190,-10 Z M 180,-50 L 230,-50 L 230,-30 L 180,-10 Z M 180,-10 L 230,-10 L 230,10 L 180,30 Z M 250,-80 L 320,-80 L 320,-60 L 250,-40 Z M 250,-80 L 270,-60 L 270,-20 L 250,0 Z M 300,-80 L 320,-60 L 320,-20 L 300,0 Z M 250,-40 L 320,-40 L 320,-20 L 250,0 Z M 250,0 L 320,0 L 320,20 L 250,40 Z M 250,0 L 270,20 L 270,40 L 250,60 Z M 300,0 L 320,20 L 320,40 L 300,60 Z M 250,40 L 320,40 L 320,60 L 250,80 Z" class="logo-gray" transform="skewX(-10)"/>
    
    <!-- AI 文字 - 灰色粗体 -->
    <text x="350" y="20" font-family="Arial Black, sans-serif" font-size="120" font-weight="900" class="logo-gray" letter-spacing="10" transform="skewX(-10)">AI</text>
  </g>
  
  <!-- 底部拼音框 XIAOJAI -->
  <g transform="translate(400, 370)">
    <!-- 背景框 -->
    <rect x="0" y="0" width="620" height="60" fill="#333333" rx="5"/>
    
    <!-- 拼音文字 -->
    <text x="310" y="42" font-family="Arial, sans-serif" font-size="38" font-weight="400" class="logo-white" text-anchor="middle" letter-spacing="35">XIAOJAI</text>
  </g>
</svg>