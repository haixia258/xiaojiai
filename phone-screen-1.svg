<svg width="450" height="812" viewBox="0 0 450 812" xmlns="http://www.w3.org/2000/svg">
  <!-- 手机背景 -->
  <rect width="450" height="812" fill="#f5f5f5" rx="40"/>
  
  <!-- 顶部状态栏 -->
  <rect width="450" height="44" fill="#e8e8e8"/>
  <text x="20" y="30" font-size="14" fill="#000">18:15</text>
  
  <!-- 标题 -->
  <text x="225" y="90" font-size="18" font-weight="bold" fill="#000" text-anchor="middle">創作中心</text>
  
  <!-- 顶部横幅 -->
  <defs>
    <linearGradient id="banner1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa500;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="12" y="130" width="426" height="120" rx="15" fill="url(#banner1)"/>
  <text x="225" y="175" font-size="24" font-weight="bold" fill="white" text-anchor="middle">一部手機 小雞創作</text>
  <text x="225" y="210" font-size="24" font-weight="bold" fill="white" text-anchor="middle">海量爆款 輕鬆獲客</text>
  
  <!-- 功能卡片网格 -->
  <!-- 第一行 -->
  <rect x="12" y="270" width="205" height="140" rx="15" fill="#E91E63" opacity="0.9"/>
  <text x="114" y="320" font-size="18" font-weight="bold" fill="white" text-anchor="middle">對標圖文</text>
  
  <rect x="233" y="270" width="205" height="140" rx="15" fill="#FF9800" opacity="0.9"/>
  <text x="335" y="320" font-size="18" font-weight="bold" fill="white" text-anchor="middle">對標視頻</text>
  
  <!-- 第二行 -->
  <rect x="12" y="425" width="205" height="140" rx="15" fill="#2196F3" opacity="0.9"/>
  <text x="114" y="475" font-size="18" font-weight="bold" fill="white" text-anchor="middle">爆款工廠</text>
  
  <rect x="233" y="425" width="205" height="140" rx="15" fill="#9C27B0" opacity="0.9"/>
  <text x="335" y="475" font-size="18" font-weight="bold" fill="white" text-anchor="middle">數字分身</text>
  
  <!-- 第三行 -->
  <rect x="12" y="580" width="205" height="140" rx="15" fill="#4CAF50" opacity="0.9"/>
  <text x="114" y="630" font-size="18" font-weight="bold" fill="white" text-anchor="middle">我有思路</text>
  
  <rect x="233" y="580" width="205" height="140" rx="15" fill="#7E57C2" opacity="0.9"/>
  <text x="335" y="630" font-size="18" font-weight="bold" fill="white" text-anchor="middle">我有產品</text>
  
  <!-- 底部导航栏 -->
  <rect y="740" width="450" height="72" fill="#fff"/>
  <circle cx="90" cy="765" r="12" fill="#999"/>
  <circle cx="225" cy="765" r="12" fill="#999"/>
  <circle cx="360" cy="765" r="12" fill="#E91E63"/>
</svg>
